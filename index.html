<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        h2 {
            margin-top: 30px;
        }

        #taskInput {
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px;
            margin-left: 5px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 250px;
            display: flex;
            justify-content: space-between;
            border-radius: 5px;
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body>

<h2>📝 My To-Do List</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

<script src="script.js"></script>

</body>
</html>
